name: Versioned Release

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Merge pull request') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Parse version.yaml
        id: version
        run: |
          echo "RUN=$(yq '.run' version.yaml)" >> $GITHUB_ENV
          echo "VERSION=$(yq '.version' version.yaml)" >> $GITHUB_ENV
          echo "DESC<<EOF" >> $GITHUB_ENV
          yq '.description' version.yaml >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Stop if run=false
        if: ${{ env.RUN == 'false' }}
        run: echo "run=false → skipping release."

      - name: Set up Python 3.11
        if: ${{ env.RUN == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        if: ${{ env.RUN == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pip
          pip install build tomli tomli_w


      - name: Inject version into pyproject.toml
        if: ${{ env.RUN == 'true' }}
        run: |
          python - << 'EOF'
          import tomli, tomli_w
          import os

          version = os.environ["VERSION"]

          d = tomli.load(open('pyproject.toml','rb'))
          d['project']['version'] = version
          open('pyproject.toml','wb').write(tomli_w.dumps(d).encode())
          EOF

      - name: Build package
        if: ${{ env.RUN == 'true' }}
        run: |
          rm -rf dist
          python -m build

      - name: Create GitHub Release
        if: ${{ env.RUN == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.DESC }}
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        if: ${{ env.RUN == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
